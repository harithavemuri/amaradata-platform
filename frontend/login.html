<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <title>Sign In — AmaraData Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#112240;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:#fff;border-radius:14px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);}

    .logo{text-align:center;margin-bottom:28px;}
    .logo-icon{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,#1E3A5F,#0D9488);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;padding:4px;}
    .logo-title{font-size:22px;font-weight:700;color:#0f172a;letter-spacing:.3px;}
    .logo-sub{font-size:13px;color:#64748b;margin-top:4px;}

    h2{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:20px;}

    /* Google button */
    .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:#fff;color:#374151;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
    .btn-google:hover{background:#f9fafb;border-color:#9ca3af;box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .btn-google:disabled{opacity:.5;cursor:default;}
    .btn-google svg{flex-shrink:0;}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#9ca3af;font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb;}

    label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;}
    input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;color:#111827;font-family:inherit;margin-bottom:14px;}
    input:focus{outline:none;border-color:#0D9488;box-shadow:0 0 0 3px rgba(13,148,136,.15);}

    .btn-primary{width:100%;padding:12px;background:#0D9488;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;font-family:inherit;}
    .btn-primary:hover{background:#0B7A70;}

    .msg{font-size:13px;margin-top:12px;text-align:center;padding:8px 12px;border-radius:6px;display:none;}
    .msg.err{color:#dc2626;background:#fef2f2;}
    .msg.ok{color:#059669;background:#f0fdf4;}

    .loading{text-align:center;padding:8px 0;font-size:13px;color:#64748b;display:none;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #e2e8f0;border-top-color:#0D9488;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .back{text-align:center;margin-top:18px;font-size:13px;color:#64748b;}
    .back a{color:#0D9488;font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 500 500" width="100%" height="100%">
          <path d="M250 50L50 400H150L180 340H320L350 400H450L250 50Z" fill="white"/>
          <circle cx="215" cy="278" r="30" fill="rgba(14,165,233,0.8)"/>
          <circle cx="285" cy="278" r="30" fill="rgba(14,165,233,0.8)"/>
        </svg>
      </div>
      <div class="logo-title">AmaraData</div>
      <div class="logo-sub">Platform Console</div>
    </div>

    <h2>Staff Sign In</h2>

    <!-- Google Sign-In -->
    <button class="btn-google" id="googleSignInBtn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <div class="loading" id="loading">
      <span class="spinner"></span> Authenticating…
    </div>
    <div class="msg err" id="errMsg"></div>
    <div class="msg ok"  id="okMsg"></div>

    <div class="divider">or</div>

    <!-- Email / password fallback -->
    <label>Email</label>
    <input type="email" id="email" placeholder="you@amaradata.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">Sign In</button>

    <div class="back"><a href="/">← Back to home</a></div>
  </div>

  <script src="/js/platform.js"></script>
  <script>
    // Only auto-redirect if there are no OAuth callback params in the URL
    const _oauthParams = new URLSearchParams(location.search);
    if (window.__amrd && window.__amrd.isLoggedIn() && !_oauthParams.get('code')) {
        location.href = '/dashboard';
    }

    /* ── Email / password login ─────────────────────────────────────── */
    async function doLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        showErr('');
        try {
            await window.__amrd.login(email, password);
            location.href = '/dashboard';
        } catch (e) {
            showErr(e.message);
        }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    /* ── Google OAuth PKCE ──────────────────────────────────────────── */
    const API = '';   // same origin

    class GoogleAuth {
        constructor() {
            document.getElementById('googleSignInBtn').addEventListener('click', () => this.handleSignIn());
            this.handleCallback();
        }

        async handleSignIn() {
            try {
                this.busy(true);
                showErr('');
                const res  = await fetch(`${API}/api/auth/google/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
                });
                if (!res.ok) throw new Error('Authentication service unavailable');
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Failed to initiate authentication');

                sessionStorage.setItem('oauth_session', JSON.stringify({
                    sessionId:    data.data.sessionId,
                    state:        data.data.state,
                    codeVerifier: data.data.codeVerifier,
                }));
                window.location.href = data.data.authUrl;
            } catch (err) {
                showErr(err.message);
                this.busy(false);
            }
        }

        async handleCallback() {
            const params = new URLSearchParams(window.location.search);
            const code   = params.get('code');
            const state  = params.get('state');
            const error  = params.get('error');

            if (error) { showErr(decodeURIComponent(error)); return; }
            if (!code || !state) return;

            try {
                this.busy(true);
                showErr('');

                let sessionId = params.get('session_id');
                if (!sessionId && state.includes(':')) sessionId = state.split(':')[0];

                const stored = sessionStorage.getItem('oauth_session');
                if (!stored) throw new Error('Authentication session expired. Please sign in again.');

                const session = JSON.parse(stored);
                if (state !== session.state) throw new Error('Invalid state — possible CSRF attempt.');

                const res = await fetch(`${API}/api/auth/google/exchange`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code,
                        state,
                        session_id:    sessionId || session.sessionId,
                        code_verifier: session.codeVerifier,
                    }),
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.error || 'Authentication failed');

                sessionStorage.removeItem('oauth_session');

                // Store same keys as email/password login
                const { token, refresh_token, user } = result.data;
                localStorage.setItem('amrd_token',         token);
                localStorage.setItem('amrd_refresh_token', refresh_token);
                localStorage.setItem('amrd_staff',         JSON.stringify(user));

                showOk('Signed in! Redirecting…');
                setTimeout(() => { location.href = '/dashboard'; }, 800);
            } catch (err) {
                showErr(err.message);
                this.busy(false);
                history.replaceState({}, '', '/login');
            }
        }

        busy(on) {
            document.getElementById('googleSignInBtn').disabled = on;
            document.getElementById('loading').style.display   = on ? 'block' : 'none';
        }
    }

    function showErr(msg) {
        const el = document.getElementById('errMsg');
        el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    }
    function showOk(msg) {
        const el = document.getElementById('okMsg');
        el.textContent = msg; el.style.display = msg ? 'block' : 'none';
    }

    document.addEventListener('DOMContentLoaded', () => new GoogleAuth());
  </script>
</body>
</html>
