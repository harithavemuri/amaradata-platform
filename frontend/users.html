<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <title>Users — AmaraData Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="/js/platform.js"></script>
</head>
<body>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const root = window.__amrd.renderSidebar('Users');

    let availableRoles = [];
    let availableGroups = [];
    let users = [];
    let editId = null;
    let viewUserId = null;

    // ── modal ────────────────────────────────────────────────────────────────
    function modal(show, user = {}) {
        editId = user.id || null;
        document.getElementById('modalTitle').textContent = editId ? 'Edit User' : 'Add User';
        document.getElementById('fEmail').value     = user.email    || '';
        document.getElementById('fEmail').disabled  = !!editId;
        document.getElementById('fName').value      = user.name     || '';
        document.getElementById('fRole').value      = user.role     || 'staff';
        document.getElementById('fActive').checked  = user.is_active !== false;
        document.getElementById('fPassword').value  = '';
        document.getElementById('modalErr').textContent = '';
        document.getElementById('userModal').style.display = show ? 'flex' : 'none';
    }

    async function saveUser() {
        const email    = document.getElementById('fEmail').value.trim();
        const name     = document.getElementById('fName').value.trim();
        const role     = document.getElementById('fRole').value;
        const is_active= document.getElementById('fActive').checked;
        const password = document.getElementById('fPassword').value;
        const errEl    = document.getElementById('modalErr');

        if (!name || (!editId && !email)) { errEl.textContent = 'Name and email are required'; return; }

        const body = editId ? { name, role, is_active } : { email, name, role };
        if (password) body.password = password;

        try {
            const method = editId ? 'PUT' : 'POST';
            const path   = editId ? `/api/admin/users/${editId}` : '/api/admin/users';
            await window.__amrd.apiFetch(path, { method, body: JSON.stringify(body) });
            modal(false);
            loadUsers();
        } catch (e) { errEl.textContent = e.message; }
    }

    async function deactivate(id, active) {
        if (!confirm(active ? 'Deactivate this user?' : 'Reactivate this user?')) return;
        try {
            await window.__amrd.apiFetch(`/api/admin/users/${id}`, {
                method: 'PUT', body: JSON.stringify({ is_active: !active }),
            });
            loadUsers();
        } catch (e) { alert(e.message); }
    }

    // ── user detail panel ────────────────────────────────────────────────────
    function userPanel(show, userId) {
        viewUserId = userId || null;
        if (!show) { document.getElementById('userPanel').style.display = 'none'; return; }
        const u = users.find(u => u.id == userId);
        document.getElementById('userPanelName').textContent = u?.name || '';
        document.getElementById('userPanel').style.display = 'flex';
        renderUserPanel(u);
    }

    function renderUserPanel(u) {
        if (!u) return;
        const groups = u.groups || [];
        const roleColours = {
            site_admin:'#7c3aed;background:#ede9fe', admin:'#1d4ed8;background:#dbeafe',
            sales_manager:'#0D9488;background:#ccfbf1', billing:'#d97706;background:#fef3c7', staff:'#64748b;background:#f1f5f9',
        };
        const roleBadge = r => {
            const c = roleColours[r] || '64748b;background:#f1f5f9';
            return `<span class="amrd-badge" style="color:${c}">${(r||'').replace(/_/g,' ')}</span>`;
        };

        const groupItems = groups.length
            ? groups.map(g => `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9">
                    <div>
                        <div style="font-weight:600;font-size:13px">${g.name}</div>
                        ${g.role ? `<div style="font-size:11px;color:#64748b;margin-top:2px">Confers: ${roleBadge(g.role)}</div>` : '<div style="font-size:11px;color:#94a3b8">No role assigned</div>'}
                    </div>
                    <button class="amrd-btn amrd-btn-sm" style="background:#fee2e2;color:#dc2626"
                        onclick="removeFromGroup(${g.id},${u.id})">Remove</button>
                </div>`).join('')
            : '<p style="color:#94a3b8;font-size:13px">Not in any group.</p>';

        const nonMemberGroups = availableGroups.filter(g => !groups.some(ug => ug.id === g.id));

        document.getElementById('userPanelBody').innerHTML = `
            <div style="margin-bottom:16px">
                <div style="font-size:12px;color:#64748b;margin-bottom:4px">Direct Role</div>
                ${roleBadge(u.role)}
            </div>
            <div style="font-size:12px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Group Memberships</div>
            <div id="groupItemList">${groupItems}</div>
            <div style="margin-top:14px;padding-top:14px;border-top:1px solid #f1f5f9">
                <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">Add to Group</div>
                <select id="addGroupSelect" style="margin-bottom:8px">
                    <option value="">— Select a group —</option>
                    ${nonMemberGroups.map(g => `<option value="${g.id}">${g.name}${g.role ? ' ('+g.role.replace(/_/g,' ')+')' : ''}</option>`).join('')}
                </select>
                <button class="amrd-btn amrd-btn-primary amrd-btn-sm" style="width:100%" onclick="addToGroup(${u.id})">Add to Group</button>
            </div>`;
    }

    async function addToGroup(userId) {
        const groupId = document.getElementById('addGroupSelect').value;
        if (!groupId) return;
        try {
            await window.__amrd.apiFetch(`/api/admin/user-groups/${groupId}/members`, {
                method: 'POST', body: JSON.stringify({ user_id: parseInt(userId) }),
            });
            await loadUsers();
            userPanel(true, userId);
        } catch (e) { alert(e.message); }
    }

    async function removeFromGroup(groupId, userId) {
        try {
            await window.__amrd.apiFetch(`/api/admin/user-groups/${groupId}/members/${userId}`, { method: 'DELETE' });
            await loadUsers();
            userPanel(true, userId);
        } catch (e) { alert(e.message); }
    }

    async function loadUsers() {
        root.innerHTML = '<p style="color:#94a3b8;padding:20px">Loading…</p>';
        try {
            const [uRes, rRes, gRes] = await Promise.all([
                window.__amrd.apiFetch('/api/admin/users'),
                window.__amrd.apiFetch('/api/admin/roles'),
                window.__amrd.apiFetch('/api/admin/user-groups'),
            ]);
            users           = uRes.data || [];
            availableRoles  = rRes.data || [];
            availableGroups = gRes.data || [];
            render();
        } catch (e) {
            root.innerHTML = `<p style="color:#dc2626;padding:20px">Failed to load users: ${e.message}</p>`;
        }
    }

    function roleBadge(role) {
        const colours = {
            site_admin:    '#7c3aed;background:#ede9fe',
            admin:         '#1d4ed8;background:#dbeafe',
            sales_manager: '#0D9488;background:#ccfbf1',
            billing:       '#d97706;background:#fef3c7',
            staff:         '#64748b;background:#f1f5f9',
        };
        const c = colours[role] || '64748b;background:#f1f5f9';
        return `<span class="amrd-badge" style="color:${c}">${(role||'').replace(/_/g,' ')}</span>`;
    }

    function render() {
        root.innerHTML = `
        <div class="amrd-flex-row">
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <input id="search" type="text" placeholder="Search by name or email…"
                    style="width:260px;padding:8px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;"
                    oninput="filterUsers(this.value)">
                <button class="amrd-btn amrd-btn-primary" onclick="openAdd()">+ Add User</button>
            </div>

            <div class="amrd-card" style="padding:0">
                <div class="amrd-table-wrap">
                <table class="amrd-table" id="usersTable">
                    <thead><tr>
                        <th>Name</th><th>Email</th><th>Direct Role</th><th>Groups</th><th>Status</th><th>Last Login</th><th>Actions</th>
                    </tr></thead>
                    <tbody id="usersTbody"></tbody>
                </table>
                </div>
            </div>
          </div>

          <!-- User Detail Panel -->
          <div id="userPanel" class="amrd-side-panel" style="display:none;flex-direction:column;width:320px;flex-shrink:0">
            <div class="amrd-card" style="flex:1">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                    <h3 id="userPanelName" style="margin:0;font-size:14px;font-weight:700"></h3>
                    <button class="amrd-btn amrd-btn-sm amrd-btn-ghost" onclick="closeUserPanel()">✕</button>
                </div>
                <div id="userPanelBody"></div>
                <div style="margin-top:14px;padding-top:12px;border-top:1px solid #f1f5f9">
                    <a href="/user-groups" class="amrd-btn amrd-btn-ghost amrd-btn-sm" style="display:block;text-align:center;text-decoration:none">Manage groups →</a>
                </div>
            </div>
          </div>
        </div>

        <!-- Modal -->
        <div id="userModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;">
            <div style="background:#fff;border-radius:12px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);">
                <h3 id="modalTitle" style="margin:0 0 20px;font-size:16px;color:#0f172a;"></h3>
                <div id="modalErr" style="color:#dc2626;font-size:13px;margin-bottom:12px;"></div>
                <div class="amrd-form-row">
                    <div><label>Name *</label><input id="fName" type="text" placeholder="Full name"></div>
                    <div><label>Role</label>
                        <select id="fRole">${availableRoles.map(r => `<option value="${r.name}">${r.label}</option>`).join('')}</select>
                    </div>
                </div>
                <div class="amrd-form-row full">
                    <div><label>Email *</label><input id="fEmail" type="email" placeholder="user@amaradata.com"></div>
                </div>
                <div class="amrd-form-row full">
                    <div><label>Password <span style="color:#94a3b8;font-weight:400">(leave blank to keep unchanged)</span></label>
                        <input id="fPassword" type="password" placeholder="••••••••" autocomplete="new-password"></div>
                </div>
                <div style="margin-bottom:18px;display:flex;align-items:center;gap:8px;">
                    <input id="fActive" type="checkbox" style="width:auto;margin:0">
                    <label style="margin:0;font-weight:500;color:#374151;">Active</label>
                </div>
                <div style="display:flex;gap:10px;justify-content:flex-end;">
                    <button class="amrd-btn amrd-btn-ghost" onclick="closeModal()">Cancel</button>
                    <button class="amrd-btn amrd-btn-primary" onclick="saveUser()">Save</button>
                </div>
            </div>
        </div>`;

        window.openAdd       = () => modal(true);
        window.openEdit      = (id) => modal(true, users.find(u => u.id == id));
        window.closeModal    = () => modal(false);
        window.saveUser      = saveUser;
        window.deactivate    = deactivate;
        window.openUserPanel = (id) => userPanel(true, id);
        window.closeUserPanel= () => userPanel(false);
        window.addToGroup    = addToGroup;
        window.removeFromGroup = removeFromGroup;
        window.filterUsers   = (q) => {
            const lq = q.toLowerCase();
            document.querySelectorAll('#usersTbody tr').forEach(tr => {
                tr.style.display = tr.dataset.search.includes(lq) ? '' : 'none';
            });
        };

        renderRows(users);
    }

    function renderRows(rows) {
        const fmt = (d) => d ? new Date(d).toLocaleDateString() : '—';
        document.getElementById('usersTbody').innerHTML = rows.map(u => {
            const groups = u.groups || [];
            const groupBadges = groups.length
                ? groups.map(g => `<span class="amrd-badge" style="background:#dbeafe;color:#1d4ed8;margin-right:4px;cursor:pointer" onclick="openUserPanel(${u.id})">${g.name}</span>`).join('')
                : '<span style="color:#94a3b8;font-size:12px">—</span>';
            return `
            <tr data-search="${(u.name + u.email + u.role + groups.map(g=>g.name).join(' ')).toLowerCase()}">
                <td style="font-weight:600;cursor:pointer;color:#0D9488" onclick="openUserPanel(${u.id})">${u.name}</td>
                <td style="color:#64748b">${u.email}</td>
                <td>${roleBadge(u.role)}</td>
                <td>${groupBadges}</td>
                <td><span class="amrd-badge ${u.is_active ? 'amrd-badge-active' : 'amrd-badge-cancelled'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
                <td style="color:#64748b;font-size:12px">${fmt(u.last_login_at)}</td>
                <td>
                    <button class="amrd-btn amrd-btn-sm amrd-btn-ghost" onclick="openEdit(${u.id})">Edit</button>
                    <button class="amrd-btn amrd-btn-sm" style="background:${u.is_active?'#fee2e2':'#dcfce7'};color:${u.is_active?'#dc2626':'#15803d'};margin-left:6px"
                        onclick="deactivate(${u.id},${u.is_active})">${u.is_active ? 'Deactivate' : 'Reactivate'}</button>
                </td>
            </tr>`;
        }).join('');
    }

    loadUsers();
});
</script>
</body>
</html>
