<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" font-family="'Segoe UI',Arial,sans-serif">
  <!-- Background -->
  <rect width="1400" height="600" fill="#0f172a"/>

  <!-- Sidebar -->
  <rect width="220" height="600" fill="#1e293b"/>
  <text x="24" y="38" fill="#0D9488" font-size="18" font-weight="700" letter-spacing="1">AmaraData</text>
  <text x="24" y="54" fill="#475569" font-size="10">Platform Console</text>
  <rect x="0" y="68" width="220" height="1" fill="#334155"/>
  <text x="32" y="100" fill="#64748b" font-size="13">Dashboard</text>
  <text x="32" y="132" fill="#64748b" font-size="13">Tenants</text>
  <text x="32" y="164" fill="#64748b" font-size="13">Invoices</text>
  <text x="32" y="196" fill="#64748b" font-size="13">Enhancements</text>
  <rect x="0" y="212" width="4" height="36" fill="#0D9488"/>
  <rect x="8" y="220" width="16" height="16" rx="3" fill="#0D9488"/>
  <text x="32" y="232" fill="#e2e8f0" font-size="13" font-weight="600">Billing Metrics</text>

  <!-- Top bar -->
  <rect x="220" y="0" width="1180" height="56" fill="#1e293b"/>
  <text x="248" y="34" fill="#f1f5f9" font-size="18" font-weight="700">Billing Metrics — May 2026</text>
  <rect x="1220" y="12" width="160" height="32" rx="6" fill="#334155"/>
  <text x="1238" y="32" fill="#94a3b8" font-size="12">Collect Metrics</text>

  <!-- Summary cards -->
  <rect x="248" y="70" width="200" height="90" rx="8" fill="#1e293b"/>
  <text x="268" y="96" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">TOTAL SALES VALUE</text>
  <text x="268" y="132" fill="#f1f5f9" font-size="28" font-weight="700">₹8.4Cr</text>
  <text x="268" y="150" fill="#10b981" font-size="11">↑ 12% this month</text>

  <rect x="468" y="70" width="200" height="90" rx="8" fill="#1e293b"/>
  <text x="488" y="96" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">RENTAL INCOME</text>
  <text x="488" y="132" fill="#f1f5f9" font-size="28" font-weight="700">₹2.1Cr</text>
  <text x="488" y="150" fill="#10b981" font-size="11">↑ 5% this month</text>

  <rect x="688" y="70" width="200" height="90" rx="8" fill="#1e293b"/>
  <text x="708" y="96" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">PROPERTIES SOLD</text>
  <text x="708" y="132" fill="#f1f5f9" font-size="28" font-weight="700">34</text>
  <text x="708" y="150" fill="#10b981" font-size="11">↑ 4 from last month</text>

  <rect x="908" y="70" width="200" height="90" rx="8" fill="#1e293b"/>
  <text x="928" y="96" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">ACTIVE PROPERTIES</text>
  <text x="928" y="132" fill="#f1f5f9" font-size="28" font-weight="700">312</text>
  <text x="928" y="150" fill="#94a3b8" font-size="11">across 18 tenants</text>

  <rect x="1128" y="70" width="240" height="90" rx="8" fill="#1e293b"/>
  <text x="1148" y="96" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">RENTAL UNITS ACTIVE</text>
  <text x="1148" y="132" fill="#f1f5f9" font-size="28" font-weight="700">187</text>
  <text x="1148" y="150" fill="#94a3b8" font-size="11">avg occupancy 92%</text>

  <!-- Rental income line chart -->
  <rect x="248" y="178" width="660" height="380" rx="10" fill="#1e293b"/>
  <text x="272" y="206" fill="#f1f5f9" font-size="14" font-weight="600">Rental Income Trend (₹ Lakhs)</text>

  <!-- Y axis labels -->
  <text x="258" y="280" fill="#475569" font-size="10">50</text>
  <text x="258" y="330" fill="#475569" font-size="10">40</text>
  <text x="258" y="380" fill="#475569" font-size="10">30</text>
  <text x="258" y="430" fill="#475569" font-size="10">20</text>
  <text x="258" y="480" fill="#475569" font-size="10">10</text>

  <!-- Grid lines -->
  <line x1="280" y1="275" x2="890" y2="275" stroke="#334155" stroke-width="1"/>
  <line x1="280" y1="325" x2="890" y2="325" stroke="#334155" stroke-width="1"/>
  <line x1="280" y1="375" x2="890" y2="375" stroke="#334155" stroke-width="1"/>
  <line x1="280" y1="425" x2="890" y2="425" stroke="#334155" stroke-width="1"/>
  <line x1="280" y1="475" x2="890" y2="475" stroke="#334155" stroke-width="1"/>

  <!-- Area fill -->
  <path d="M 290 460 L 380 440 L 470 415 L 560 395 L 650 370 L 740 350 L 830 330 L 870 475 Z"
        fill="#0D9488" opacity=".15"/>
  <!-- Line -->
  <polyline points="290,460 380,440 470,415 560,395 650,370 740,350 830,330"
            fill="none" stroke="#0D9488" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="290" cy="460" r="4" fill="#0D9488"/>
  <circle cx="380" cy="440" r="4" fill="#0D9488"/>
  <circle cx="470" cy="415" r="4" fill="#0D9488"/>
  <circle cx="560" cy="395" r="4" fill="#0D9488"/>
  <circle cx="650" cy="370" r="4" fill="#0D9488"/>
  <circle cx="740" cy="350" r="4" fill="#0D9488"/>
  <circle cx="830" cy="330" r="5" fill="#fff" stroke="#0D9488" stroke-width="2"/>

  <!-- X axis labels -->
  <text x="282" y="495" fill="#475569" font-size="10" text-anchor="middle">Nov</text>
  <text x="372" y="495" fill="#475569" font-size="10" text-anchor="middle">Dec</text>
  <text x="462" y="495" fill="#475569" font-size="10" text-anchor="middle">Jan</text>
  <text x="552" y="495" fill="#475569" font-size="10" text-anchor="middle">Feb</text>
  <text x="642" y="495" fill="#475569" font-size="10" text-anchor="middle">Mar</text>
  <text x="732" y="495" fill="#475569" font-size="10" text-anchor="middle">Apr</text>
  <text x="822" y="495" fill="#f1f5f9" font-size="10" text-anchor="middle" font-weight="600">May</text>

  <!-- Per-tenant breakdown panel -->
  <rect x="928" y="178" width="440" height="380" rx="10" fill="#1e293b"/>
  <text x="952" y="206" fill="#f1f5f9" font-size="14" font-weight="600">By Tenant — May 2026</text>
  <rect x="952" y="215" width="396" height="1" fill="#334155"/>

  <!-- Tenant rows -->
  <text x="952" y="244" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">TENANT</text>
  <text x="1152" y="244" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">SALES</text>
  <text x="1232" y="244" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">RENTAL</text>
  <text x="1320" y="244" fill="#64748b" font-size="10" font-weight="700" letter-spacing=".8">PROPS</text>
  <rect x="952" y="249" width="396" height="1" fill="#334155"/>

  <text x="952" y="274" fill="#e2e8f0" font-size="13">Rohas Group</text>
  <text x="1152" y="274" fill="#e2e8f0" font-size="12">₹2.8Cr</text>
  <text x="1232" y="274" fill="#e2e8f0" font-size="12">₹68L</text>
  <text x="1320" y="274" fill="#94a3b8" font-size="12">92</text>

  <text x="952" y="304" fill="#e2e8f0" font-size="13">Sai Builders</text>
  <text x="1152" y="304" fill="#e2e8f0" font-size="12">₹2.1Cr</text>
  <text x="1232" y="304" fill="#e2e8f0" font-size="12">₹52L</text>
  <text x="1320" y="304" fill="#94a3b8" font-size="12">76</text>

  <text x="952" y="334" fill="#e2e8f0" font-size="13">MK Estates</text>
  <text x="1152" y="334" fill="#e2e8f0" font-size="12">₹1.4Cr</text>
  <text x="1232" y="334" fill="#e2e8f0" font-size="12">₹34L</text>
  <text x="1320" y="334" fill="#94a3b8" font-size="12">44</text>

  <text x="952" y="364" fill="#e2e8f0" font-size="13">Lakshmi Infra</text>
  <text x="1152" y="364" fill="#e2e8f0" font-size="12">₹1.0Cr</text>
  <text x="1232" y="364" fill="#e2e8f0" font-size="12">₹28L</text>
  <text x="1320" y="364" fill="#94a3b8" font-size="12">40</text>

  <text x="952" y="394" fill="#e2e8f0" font-size="13">GreenAcres</text>
  <text x="1152" y="394" fill="#e2e8f0" font-size="12">₹0.6Cr</text>
  <text x="1232" y="394" fill="#e2e8f0" font-size="12">₹18L</text>
  <text x="1320" y="394" fill="#94a3b8" font-size="12">28</text>

  <text x="952" y="424" fill="#e2e8f0" font-size="13">Others (13)</text>
  <text x="1152" y="424" fill="#e2e8f0" font-size="12">₹0.5Cr</text>
  <text x="1232" y="424" fill="#e2e8f0" font-size="12">₹10L</text>
  <text x="1320" y="424" fill="#94a3b8" font-size="12">32</text>

  <rect x="952" y="434" width="396" height="1" fill="#334155"/>
  <text x="952" y="458" fill="#64748b" font-size="11" font-weight="700">TOTAL</text>
  <text x="1152" y="458" fill="#f1f5f9" font-size="12" font-weight="700">₹8.4Cr</text>
  <text x="1232" y="458" fill="#f1f5f9" font-size="12" font-weight="700">₹2.1Cr</text>
  <text x="1320" y="458" fill="#f1f5f9" font-size="12" font-weight="700">312</text>
</svg>
