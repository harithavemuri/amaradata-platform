  <!-- Right panel — heatmap / distribution -->
  <rect x="1080" y="60" width="280" height="400" rx="14" fill="#1e293b"/>
  <text x="1116" y="105" fill="#f1f5f9" font-size="13" font-weight="600">Price Distribution</text>
  <text x="1116" y="126" fill="#64748b" font-size="10">Platform Market · May 2026</text>
  <rect x="1116" y="138" width="208" height="1" fill="#334155"/>

  <!-- Distribution rows -->
  <text x="1116" y="164" fill="#94a3b8" font-size="11">Budget</text>
  <rect x="1200" y="152" width="100" height="14" rx="3" fill="#334155"/>
  <rect x="1200" y="152" width="28" height="14" rx="3" fill="#0D9488" opacity=".5"/>
