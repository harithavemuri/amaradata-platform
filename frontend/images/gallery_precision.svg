<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" font-family="'Segoe UI',Arial,sans-serif" preserveAspectRatio="xMidYMid slice">
  <rect width="1400" height="520" fill="#0f172a"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="130" x2="1400" y2="130" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="260" x2="1400" y2="260" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="390" x2="1400" y2="390" stroke="#1e293b" stroke-width="1"/>

  <!-- Left panel — key metrics -->
  <rect x="60" y="60" width="320" height="400" rx="14" fill="#1e293b"/>
  <text x="96" y="110" fill="#0D9488" font-size="11" font-weight="700" letter-spacing="2">PRECISION ANALYTICS</text>
  <text x="96" y="148" fill="#f1f5f9" font-size="28" font-weight="800" xml:space="preserve">Property Valuations</text>

  <rect x="96" y="172" width="248" height="1" fill="#334155"/>

  <text x="96" y="210" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.5">AVG. ACCURACY</text>
  <text x="96" y="244" fill="#10b981" font-size="40" font-weight="800">98.4%</text>
  <text x="96" y="268" fill="#475569" font-size="12">vs 89.1% industry avg</text>

  <rect x="96" y="290" width="248" height="1" fill="#334155"/>

  <text x="96" y="322" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.5">MARKET TRENDS</text>
  <text x="96" y="356" fill="#f1f5f9" font-size="36" font-weight="800">$8,240</text>
  <text x="96" y="380" fill="#0D9488" font-size="12">↑ 6.2% MoM · per sq ft</text>

  <rect x="96" y="402" width="248" height="1" fill="#334155"/>
  <text x="96" y="432" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1.5">PROPERTIES ANALYSED</text>
  <text x="96" y="456" fill="#f1f5f9" font-size="28" font-weight="700">312</text>

  <!-- Bar chart -->
  <rect x="450" y="60" width="560" height="400" rx="14" fill="#1e293b"/>
  <text x="490" y="105" fill="#f1f5f9" font-size="15" font-weight="600">Monthly Valuation Index ($ Thousands / unit)</text>

  <!-- Y-axis labels -->
  <text x="458" y="160" fill="#475569" font-size="10">120</text>
  <text x="458" y="215" fill="#475569" font-size="10">100</text>
  <text x="458" y="270" fill="#475569" font-size="10">80</text>
  <text x="458" y="325" fill="#475569" font-size="10">60</text>
  <text x="458" y="380" fill="#475569" font-size="10">40</text>

