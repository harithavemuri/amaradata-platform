  <text x="1116" y="198" fill="#94a3b8" font-size="11">Mid-Range</text>
  <rect x="1200" y="186" width="100" height="14" rx="3" fill="#334155"/>
  <rect x="1200" y="186" width="54" height="14" rx="3" fill="#0D9488" opacity=".65"/>
  <text x="1310" y="198" fill="#64748b" font-size="10">34%</text>

  <text x="1116" y="232" fill="#94a3b8" font-size="11">Premium</text>
  <rect x="1200" y="220" width="100" height="14" rx="3" fill="#334155"/>
  <rect x="1200" y="220" width="72" height="14" rx="3" fill="#0D9488" opacity=".8"/>
  <text x="1310" y="232" fill="#f1f5f9" font-size="10" font-weight="600">45%</text>

  <text x="1116" y="266" fill="#94a3b8" font-size="11">Luxury</text>
  <rect x="1200" y="254" width="100" height="14" rx="3" fill="#334155"/>
  <rect x="1200" y="254" width="38" height="14" rx="3" fill="#0D9488" opacity=".7"/>
  <text x="1310" y="266" fill="#64748b" font-size="10">24%</text>

  <text x="1116" y="300" fill="#94a3b8" font-size="11">Ultra-Lux</text>
  <rect x="1200" y="288" width="100" height="14" rx="3" fill="#334155"/>
  <rect x="1200" y="288" width="18" height="14" rx="3" fill="#0D9488" opacity=".45"/>
  <text x="1310" y="300" fill="#64748b" font-size="10">11%</text>

  <rect x="1116" y="318" width="208" height="1" fill="#334155"/>
  <text x="1116" y="348" fill="#64748b" font-size="10" font-weight="700" letter-spacing="1">AI CONFIDENCE SCORE</text>
  <text x="1116" y="384" fill="#10b981" font-size="38" font-weight="800">A+</text>
  <text x="1166" y="384" fill="#475569" font-size="13">  · 98.4%</text>
  <text x="1116" y="408" fill="#475569" font-size="11">Model trained on 2.1M data points</text>
  <text x="1116" y="428" fill="#475569" font-size="11">across 14 local micro-markets</text>
</svg>
