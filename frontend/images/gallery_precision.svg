  <line x1="490" y1="210" x2="980" y2="210" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="265" x2="980" y2="265" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="320" x2="980" y2="320" stroke="#334155" stroke-width="1"/>
  <line x1="490" y1="375" x2="980" y2="375" stroke="#334155" stroke-width="1"/>

  <!-- Bars (Nov–May, growing) -->
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>
  <rect x="510" y="325" width="42" height="50" rx="4" fill="#0D9488" opacity=".4"/>
  <rect x="576" y="305" width="42" height="70" rx="4" fill="#0D9488" opacity=".5"/>
  <rect x="642" y="278" width="42" height="97" rx="4" fill="#0D9488" opacity=".6"/>
  <rect x="708" y="255" width="42" height="120" rx="4" fill="#0D9488" opacity=".72"/>
  <rect x="774" y="230" width="42" height="145" rx="4" fill="#0D9488" opacity=".85"/>
  <rect x="840" y="205" width="42" height="170" rx="4" fill="#0D9488"/>
  <rect x="906" y="179" width="42" height="196" rx="4" fill="url(#bar)"/>

  <!-- Bar labels (value) -->
  <text x="531" y="320" fill="#64748b" font-size="9" text-anchor="middle">62</text>
  <text x="597" y="300" fill="#64748b" font-size="9" text-anchor="middle">71</text>
  <text x="663" y="273" fill="#64748b" font-size="9" text-anchor="middle">82</text>
  <text x="729" y="250" fill="#64748b" font-size="9" text-anchor="middle">91</text>
  <text x="795" y="225" fill="#94a3b8" font-size="9" text-anchor="middle">99</text>
  <text x="861" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">108</text>
  <text x="927" y="174" fill="#f1f5f9" font-size="9" text-anchor="middle">118</text>

  <!-- X-axis labels -->
  <text x="531" y="400" fill="#475569" font-size="10" text-anchor="middle">Nov</text>
  <text x="597" y="400" fill="#475569" font-size="10" text-anchor="middle">Dec</text>
  <text x="663" y="400" fill="#475569" font-size="10" text-anchor="middle">Jan</text>
  <text x="729" y="400" fill="#475569" font-size="10" text-anchor="middle">Feb</text>
  <text x="795" y="400" fill="#475569" font-size="10" text-anchor="middle">Mar</text>
  <text x="861" y="400" fill="#475569" font-size="10" text-anchor="middle">Apr</text>
  <text x="927" y="400" fill="#f1f5f9" font-size="10" text-anchor="middle" font-weight="600">May</text>

  <!-- Trend line overlay -->
  <polyline points="531,325 597,305 663,278 729,255 795,230 861,205 927,179"
