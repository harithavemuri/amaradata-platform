<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <title>Reset Password — AmaraData Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:#112240;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:#fff;border-radius:14px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-icon{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,#1E3A5F,#0D9488);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;padding:4px;}
    .logo-title{font-size:22px;font-weight:700;color:#0f172a;letter-spacing:.3px;}
    .logo-sub{font-size:13px;color:#64748b;margin-top:4px;}
    h2{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:8px;}
    p.desc{font-size:13px;color:#64748b;margin-bottom:20px;}
    label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;}
    input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;color:#111827;font-family:inherit;margin-bottom:4px;}
    input:focus{outline:none;border-color:#0D9488;box-shadow:0 0 0 3px rgba(13,148,136,.15);}
    .hint{font-size:11px;color:#9ca3af;margin-bottom:14px;}
    .btn-primary{width:100%;padding:12px;background:#0D9488;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;font-family:inherit;margin-top:6px;}
    .btn-primary:hover{background:#0B7A70;}
    .btn-primary:disabled{opacity:.5;cursor:default;}
    .msg{font-size:13px;margin-bottom:14px;padding:8px 12px;border-radius:6px;display:none;}
    .msg.err{color:#dc2626;background:#fef2f2;}
    .msg.ok{color:#059669;background:#f0fdf4;}
    .invalid{text-align:center;padding:16px 0;display:none;}
    .invalid p{font-size:13px;color:#dc2626;margin-bottom:12px;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back{text-align:center;margin-top:18px;font-size:13px;color:#64748b;}
    .back a{color:#0D9488;font-weight:600;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 500 500" width="100%" height="100%">
          <path d="M250 50L50 400H150L180 340H320L350 400H450L250 50Z" fill="white"/>
          <circle cx="215" cy="278" r="30" fill="rgba(14,165,233,0.8)"/>
          <circle cx="285" cy="278" r="30" fill="rgba(14,165,233,0.8)"/>
        </svg>
      </div>
      <div class="logo-title">AmaraData</div>
      <div class="logo-sub">Platform Console</div>
    </div>

    <h2>Reset Password</h2>
    <p class="desc">Choose a new password for your account.</p>

    <div class="msg err" id="errMsg"></div>
    <div class="msg ok"  id="okMsg"></div>

    <div class="invalid" id="invalidSection">
      <p>This reset link is invalid or has expired.</p>
      <a href="/forgot-password" style="color:#0D9488;font-weight:600;font-size:13px;text-decoration:none">Request a new reset link</a>
    </div>

    <form id="form" onsubmit="handleSubmit(event)">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      <div class="hint">Minimum 8 characters</div>
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat your password" required autocomplete="new-password">
      <button type="submit" class="btn-primary" id="submitBtn">Set new password</button>
    </form>

    <div class="back"><a href="/login">← Back to sign in</a></div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('form').style.display = 'none';
      document.getElementById('invalidSection').style.display = 'block';
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const errEl = document.getElementById('errMsg');
      errEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Saving…';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Failed to reset password. The link may have expired.';
          errEl.style.display = 'block';
          if (res.status === 400) {
            document.getElementById('form').style.display = 'none';
            document.getElementById('invalidSection').style.display = 'block';
          }
          return;
        }

        document.getElementById('form').style.display = 'none';
        const okEl = document.getElementById('okMsg');
        okEl.textContent = data.message || 'Password updated. Redirecting to sign in…';
        okEl.style.display = 'block';
        setTimeout(() => { location.href = '/login'; }, 2500);

      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    }
  </script>
</body>
</html>
